version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: observatory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: observatory
      POSTGRES_USER: observatory
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-observatory_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql

volumes:
  pgdata:
